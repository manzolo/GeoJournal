name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Remove local Java home from gradle.properties
        run: sed -i '/^org.gradle.java.home/d' gradle.properties

      - name: Determine version name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [ -n "${{ inputs.version_name }}" ]; then
            VERSION="${{ inputs.version_name }}"
          else
            VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.jks

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/geojournal-${{ steps.version.outputs.name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: geojournal-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/geojournal-${{ steps.version.outputs.name }}.apk
          retention-days: 30

      - name: Create GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: GeoJournal ${{ steps.version.outputs.name }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/geojournal-${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
